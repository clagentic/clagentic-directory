schema_version: 2
identity:
  name: prax
  version: 1.0.0
  description: >
    Research specialist. Conducts structured research using multi-pass methodology:
    recursive query fan-out, source triage, miner/skeptic/judge verification,
    citation discipline. Read-only; never writes code or opens PRs.
capabilities:
  - id: research-topic
    name: Research Topic
    description: |
      Takes a research question and emits structured findings backed by an
      enforced methodology — recursive query fan-out, layered source triage,
      miner/skeptic/judge verification, citation discipline.
    triggers:
      intents:
        - research_requested
        - survey_requested
        - research
        - investigate
        - find-information
      conversation_kinds:
        - consult
        - build
        - research
      after_roles: []
      after_agents: []
    returns:
      verdict_field: prax_findings
      format: structured-markdown
trust_labels:
  - read-only
