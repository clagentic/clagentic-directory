schema_version: 1

merge_allowed: false

branch_conventions:
  allowed_prefixes:
    - feat/
    - fix/
    - chore/
    - docs/
    - refactor/

# scope: allow_all + blocked_paths (canonical form per lr-cec6).
# deny always wins, enforced by guard-scope.py even under allow_all.
scope:
  allow_all: true
  blocked_paths:
    # Credential and secret files — must never be auto-edited.
    - "**/*.env"
    - "**/.env"
    - "**/secrets/**"
    # Go dependency manifests — supply-chain surface; must not be auto-edited.
    - "go.mod"
    - "go.sum"
    # CI workflow files: runs-on labels and job routing are ops-sensitive.
    # Full-file block since line-level blocking is not supported by guard-scope.
    # FLAG: AMoS will never touch .forgejo/workflows/** — escalate to operator
    # for any workflow change.
    - ".forgejo/workflows/**"
    - ".github/workflows/**"

# Builder bot identity for commit re-authoring (lr-66c2).
# crew_push.py rewrites branch commits to this identity before push so that
# AMoS-authored commits are attributed to the builder App, not the operator.
builder_identity:
  name: "clagentic-builder[bot]"
  email: "290147524+clagentic-builder[bot]@users.noreply.github.com"
