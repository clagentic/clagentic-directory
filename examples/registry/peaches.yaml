schema_version: 2
identity:
  name: peaches
  version: 1.0.0
  description: >
    Read-only PR/commit reviewer. Reads one PR or commit on a clean context
    window and emits structured findings against an enumerated rulebook.
    Posts at most one PR comment per invocation.
capabilities:
  - id: review-pr
    name: Review Pull Request
    description: |
      Reads a PR or commit diff and emits structured findings against a rulebook.
      Posts at most one review comment per invocation summarizing findings.
    triggers:
      intents:
        - code-review
        - review-pr
        - review-commit
        - pr_opened
        - code_ready_for_review
      conversation_kinds:
        - build
        - review
      after_roles: []
      after_agents: []
    returns:
      verdict_field: peaches_verdict
      format: structured
trust_labels:
  - read-only
