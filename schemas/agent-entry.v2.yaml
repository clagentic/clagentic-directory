$id: https://clagentic.akuehner.com/schemas/agent-entry/v2.yaml
$schema: https://json-schema.org/draft/2020-12/schema
title: AgentEntry
description: |
  Agent capability entry for the clagentic-directory registry, schema version 2.
  v2 gates the intent vocabulary as an enum, makes returns required, and constrains
  conversation_kinds and trust_labels to enumerated values.
  See docs/VOCABULARY.md for canonical vocabulary with semantics.

type: object
additionalProperties: false
required:
  - schema_version
  - identity
  - capabilities
properties:
  schema_version:
    const: 2
  identity:
    type: object
    required: [name, version]
    additionalProperties: false
    properties:
      name:
        type: string
        pattern: "^[a-z][a-z0-9-]*$"
      version:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      description:
        type: string
  capabilities:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, name, description, returns]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        triggers:
          type: object
          additionalProperties: false
          properties:
            intents:
              type: array
              items:
                type: string
                enum:
                  # Code work
                  - code_work_requested
                  - code-generation
                  - implement-task
                  # Code review
                  - pr_opened
                  - code_ready_for_review
                  - code-review
                  - review-pr
                  - review-commit
                  # Merge / release
                  - merge_requested
                  - merge-pr
                  - release
                  - tag-release
                  # Diagnosis
                  - diagnostic_requested
                  - root_cause_unknown
                  - escalation_diagnosis
                  # Ops
                  - deploy_requested
                  - runbook_run
                  - ops_check
                  # Research
                  - research_requested
                  - survey_requested
                  - research
                  - investigate
                  - find-information
                  # Web research
                  - web-research
                  - web-search
                  - url-fetch
                  - fact-lookup
                  - doc-lookup
                  - large-context-analysis
                  - codebase-survey
                  - community-sentiment
                  - reddit-research
                  - user-opinion-research
                  # Analysis & review
                  - deep-analysis
                  - architecture-review
                  - security-review
                  - tradeoff-evaluation
                  - second-opinion
                  # Model delegation
                  - delegate-to-codex
                  - codex-review
                  - gpt-reasoning
                  - local-inference
                  - cheap-inference
                  - offline-inference
                  - embeddings
                  # Intelligence harvesting
                  - inspect-repo
                  - harvest-intelligence
                  - ingest-candidate
                  # Scaffolding
                  - scaffold_requested
                  - new_project_setup
                  # Testing & probing
                  - probe
                  - wiring-test
                  # Routing / escalation
                  - escalation
                  - portfolio_question
                  - dispatch_routing
            conversation_kinds:
              type: array
              items:
                type: string
                enum:
                  - build
                  - consult
                  - smoke
                  - gate
                  - research
                  - review
                  - deploy
                  - planning
                  - directive
                  - escalation
                  - coordination
                  # Additional kinds from canonical agents
                  - advisory
                  - code-generation
                  - classification
                  - summarization
                  - design
                  - test
            after_roles:
              type: array
              items:
                type: string
            after_agents:
              type: array
              items:
                type: string
        returns:
          type: object
          additionalProperties: false
          required: [verdict_field, format]
          properties:
            verdict_field:
              type: string
            format:
              type: string
              enum:
                - json
                - structured
                - structured-markdown
                - url
                - text
                # Additional formats from canonical agents
                - agent-result-json
                - verbatim-model-output
                - lore-tome
                - lore-tasks
                - plaintext
  trust_labels:
    type: array
    items:
      type: string
      enum:
        # Write / gate labels
        - read-only
        - write-pr
        - write-ops
        - merge-gate
        - publish
        # Routing / authority labels
        - observe
        - escalation-surface
        - dispatch-authority
        # Agent character labels
        - trusted
        - autonomous
        - lore-writer
        - high-stakes
        - release-authorized
        # Model / source origin labels
        - external-model
        - external-source
        - local-model
        # Lifecycle labels
        - test-only
