<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 112" width="112" height="112">
  <defs>
    <linearGradient id="grad" gradientUnits="userSpaceOnUse" x1="8" y1="8" x2="104" y2="104">
      <stop offset="0%"   stop-color="#00CFFF"/>
      <stop offset="45%"  stop-color="#4A7FE8"/>
      <stop offset="100%" stop-color="#7B3FE4"/>
    </linearGradient>
  </defs>

  <!-- Standard terminal frame -->
  <rect x="8" y="8" width="96" height="96" rx="8" ry="8"
        fill="none" stroke="url(#grad)" stroke-width="4.5"/>

  <!-- Header bar: search/filter row at top of listing -->
  <rect x="18" y="20" width="76" height="13" rx="3" ry="3"
        fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.55"/>
  <!-- Search icon stub: small circle + line -->
  <circle cx="27" cy="27" r="3.5"
          fill="none" stroke="url(#grad)" stroke-width="1.8" opacity="0.55"/>
  <line x1="29.5" y1="29.5" x2="32" y2="32"
        stroke="url(#grad)" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>

  <!-- Divider below header -->
  <line x1="18" y1="40" x2="94" y2="40"
        stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- ROW 1: agent dot + name line + tag line -->
  <circle cx="26" cy="52" r="4"
          fill="url(#grad)" stroke="none"/>
  <line x1="36" y1="49" x2="82" y2="49"
        stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="56" x2="62" y2="56"
        stroke="url(#grad)" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>

  <!-- ROW 2: agent dot + name line + tag line -->
  <circle cx="26" cy="68" r="4"
          fill="url(#grad)" stroke="none" opacity="0.75"/>
  <line x1="36" y1="65" x2="88" y2="65"
        stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="72" x2="55" y2="72"
        stroke="url(#grad)" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>

  <!-- ROW 3: agent dot + name line + tag line -->
  <circle cx="26" cy="84" r="4"
          fill="url(#grad)" stroke="none" opacity="0.5"/>
  <line x1="36" y1="81" x2="76" y2="81"
        stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="88" x2="66" y2="88"
        stroke="url(#grad)" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>

</svg>
